name: Deploy to AWS Lambda

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: sa-east-1
  DOTNET_VERSION: '8.0.x'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/

      - name: Build solution
        run: dotnet build src/StoreApp.Api.sln -c Release --no-restore

      - name: Run tests
        run: dotnet test src/StoreApp.Test/StoreApp.Test.csproj -c Release --no-build --logger trx

      - name: Publish Lambda package
        run: |
          dotnet publish src/StoreApp.Api/StoreApp.Api.csproj \
            -c Release \
            -o ./publish \
            --no-build \
            --self-contained=false
          
          cd publish
          zip -r ../function.zip . -x "*.pdb" "appsettings.Development.json"
          cd ..

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3
        run: |
          aws s3 cp function.zip s3://${{ secrets.S3_BUCKET }}/storeapp-api/function.zip \
            --region ${{ env.AWS_REGION }}

      - name: Update Lambda function
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --s3-bucket ${{ secrets.S3_BUCKET }} \
            --s3-key storeapp-api/function.zip \
            --region ${{ env.AWS_REGION }} \
            --publish

      - name: Configure Lambda environment variables
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --environment Variables="{DATABASE_URL=${{ secrets.DATABASE_URL }},ENABLE_SWAGGER=true}" \
            --region ${{ env.AWS_REGION }}

      - name: Verify Lambda update
        run: |
          aws lambda get-function-configuration \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --region ${{ env.AWS_REGION }}
