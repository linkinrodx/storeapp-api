name: Deploy to AWS Lambda

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: sa-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore src/StoreApp.Api.csproj

      - name: Build application
        run: |
          dotnet publish src/StoreApp.Api.csproj -c Release -o ./publish
          cd publish && zip -r ../function.zip . && cd ..

      - name: Upload to S3
        run: |
          aws s3 cp function.zip s3://${{ secrets.S3_BUCKET }}/storeapp-api/function.zip

      - name: Update Lambda function
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --s3-bucket ${{ secrets.S3_BUCKET }} \
            --s3-key storeapp-api/function.zip \
            --publish
